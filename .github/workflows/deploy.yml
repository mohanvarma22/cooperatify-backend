name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_TAG_KEY: ${{ vars.EC2_TAG_KEY }}
  EC2_TAG_VALUE: ${{ vars.EC2_TAG_VALUE }}
  CONTAINER_NAME: cooperatify-backend
  APP_PORT: "8000"
  BEDROCK_MODEL: ${{ vars.BEDROCK_MODEL || 'amazon.nova-lite-v1:0' }}

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          docker build -t "${IMAGE_URI}:${IMAGE_TAG}" -t "${IMAGE_URI}:latest" .
          docker push "${IMAGE_URI}:${IMAGE_TAG}"
          docker push "${IMAGE_URI}:latest"

          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Deploy image on EC2 through SSM
        id: deploy
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          set -euo pipefail

          INSTANCE_ID=$(
            aws ec2 describe-instances \
              --filters "Name=tag:${EC2_TAG_KEY},Values=${EC2_TAG_VALUE}" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text \
              --region "${AWS_REGION}"
          )

          if [ "${INSTANCE_ID}" = "None" ] || [ -z "${INSTANCE_ID}" ]; then
            echo "No running EC2 instance found with ${EC2_TAG_KEY}=${EC2_TAG_VALUE}."
            exit 1
          fi

          cat > ssm-parameters.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${IMAGE_URI%/*}",
              "docker pull ${IMAGE_URI}:latest",
              "docker stop ${CONTAINER_NAME} || true",
              "docker rm ${CONTAINER_NAME} || true",
              "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p ${APP_PORT}:${APP_PORT} -e AWS_REGION=${AWS_REGION} -e BEDROCK_MODEL=${BEDROCK_MODEL} ${IMAGE_URI}:latest",
              "docker image prune -f"
            ]
          }
          EOF

          COMMAND_ID=$(
            aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ${CONTAINER_NAME} from GitHub Actions run ${GITHUB_RUN_ID}" \
              --instance-ids "${INSTANCE_ID}" \
              --parameters file://ssm-parameters.json \
              --region "${AWS_REGION}" \
              --query "Command.CommandId" \
              --output text
          )

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --region "${AWS_REGION}"

      - name: Show SSM command output
        if: always() && steps.deploy.outputs.command_id != ''
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          INSTANCE_ID: ${{ steps.deploy.outputs.instance_id }}
        run: |
          set -euo pipefail

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json
